name: CI CD PIPELINE

on:
  push:
   branch: [main]

jobs: 
  build:
    runs-on:  ubantu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Nodejs
        uses: actions/setup-node@v3
        with:
          node-verison: 16

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: npm test
